<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños More!</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #FFF9E6;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .cake-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .candle-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            height: 46px;
            width: 20px;
        }

        .flame {
            width: 14px;
            height: 14px;
            background-color: #FF5722;
            border-radius: 50%;
            animation: ignite 0.5s ease-out forwards, flicker 0.6s ease-in-out infinite alternate;
            animation-delay: 3.2s;
            opacity: 0;
        }

        .candle {
            width: 10px;
            height: 30px;
            background-color: #F1C40F;
            border: 2px solid #000;
            transform-origin: bottom center;
            animation: drawElement 0.5s ease-out forwards;
            animation-delay: 2.5s;
            opacity: 0;
        }

        .cake-layer {
            border: 3px solid #000;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            transform-origin: bottom center;
            animation: drawElement 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        .layer-3 {
            width: 120px;
            height: 50px;
            background-color: #E91E63;
            animation-delay: 1.7s;
        }

        .layer-2 {
            width: 180px;
            height: 50px;
            background-color: #E67E22;
            animation-delay: 1.0s;
        }

        .layer-1 {
            width: 240px;
            height: 60px;
            background-color: #5C2C16;
            border-bottom: 3px solid #000;
            animation-delay: 0.3s;
        }

        .message {
            margin-top: 30px;
            font-size: 26pt;
            font-weight: bold;
            color: #2C3E50;
            text-align: center;
            opacity: 0;
            animation: showText 1.2s ease-out forwards;
            animation-delay: 3.8s;
        }

        @keyframes drawElement {
            0% { opacity: 0; transform: scaleX(0) scaleY(0); }
            50% { opacity: 1; transform: scaleX(1) scaleY(0.1); }
            100% { opacity: 1; transform: scaleX(1) scaleY(1); }
        }

        @keyframes ignite {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes flicker {
            0% { transform: scale(1) translateY(0); background-color: #FF5722; box-shadow: 0 0 4px #FF9800; }
            100% { transform: scale(1.15) translateY(-2px); background-color: #FF9800; box-shadow: 0 0 10px #FF5722; }
        }

        @keyframes showText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="background-audio" src="cum.mp3" autoplay loop></audio>

    <div class="cake-wrapper">
        <div class="candle-container">
            <div class="flame"></div>
            <div class="candle"></div>
        </div>

        <div class="cake-layer layer-3"></div>
        <div class="cake-layer layer-2"></div>
        <div class="cake-layer layer-1"></div>

        <div class="message">¡Feliz Cumpleaños, More! 🎂</div>
    </div>

    <script>
        /* IMPORTANTE: Los navegadores modernos bloquean la música automática por seguridad.
           He programado esta solución para que, en cuanto More entre a la página y haga un solo "clic" 
           en cualquier parte, la música empiece a sonar inmediatamente con loop eterno. */
        window.addEventListener('click', () => {
            const audio = document.getElementById('background-audio');
            if (audio.paused) {
                audio.play();
            }
        });
    </script>

</body>
</html>
